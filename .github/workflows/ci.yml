name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: mentorminds_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mentorminds_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: '5000'
      API_VERSION: v1
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/mentorminds_test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: mentorminds_test
      DB_USER: postgres
      DB_PASSWORD: testpassword
      JWT_SECRET: test-secret-key-minimum-32-characters-long
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: test-refresh-key-minimum-32-characters-long
      JWT_REFRESH_EXPIRES_IN: 30d
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: '900000'
      RATE_LIMIT_MAX_REQUESTS: '100'
      REDIS_URL: redis://localhost:6379
      LOG_LEVEL: error
      BCRYPT_ROUNDS: '1'
      PLATFORM_FEE_PERCENTAGE: '5'
      MEETING_PROVIDER: jitsi
      MEETING_API_KEY: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run build
      - name: Unit & Integration tests + coverage
        run: npm run test -- --runInBand --coverage
      - name: Security scan
        run: npm audit --audit-level=high
      - id: coverage
        name: Parse coverage summary
        run: |
          node - <<'NODE'
          const c = require('./coverage/coverage-summary.json').total;
          console.log(`lines=${c.lines.pct.toFixed(2)}`);
          console.log(`statements=${c.statements.pct.toFixed(2)}`);
          console.log(`functions=${c.functions.pct.toFixed(2)}`);
          console.log(`branches=${c.branches.pct.toFixed(2)}`);
          NODE
        shell: bash
      - name: Comment coverage report on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📊 Test Coverage Summary
            - Lines: `$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct.toFixed(2))")`%
            - Statements: `$(node -e "console.log(require('./coverage/coverage-summary.json').total.statements.pct.toFixed(2))")`%
            - Functions: `$(node -e "console.log(require('./coverage/coverage-summary.json').total.functions.pct.toFixed(2))")`%
            - Branches: `$(node -e "console.log(require('./coverage/coverage-summary.json').total.branches.pct.toFixed(2))")`%
            - Threshold: 70% (set in jest.config.ts)

  upload-artifacts:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
