name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Generate audit report
        if: always()
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mentorminds_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          cp .env.example .env.test
          sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/test:test@localhost:5432\/mentorminds_test/' .env.test

      - name: Run security tests
        run: npm test -- src/__tests__/security
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/mentorminds_test
          JWT_SECRET: test-secret-key

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-coverage
          path: coverage/

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --production
        continue-on-error: false

      - name: Check for outdated packages
        run: npm outdated || true

  sast-scan:
    name: SAST Scan (ESLint Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with security rules
        run: npm run lint
        continue-on-error: true

  owasp-zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mentorminds_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          cp .env.example .env.test
          sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/test:test@localhost:5432\/mentorminds_test/' .env.test

      - name: Start API server
        run: |
          npm run build
          npm start &
          sleep 10
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/mentorminds_test
          JWT_SECRET: test-secret-key
          PORT: 5000

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mentorminds_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          cp .env.example .env.test
          sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/test:test@localhost:5432\/mentorminds_test/' .env.test

      - name: Start API server
        run: |
          npm run build
          npm start &
          sleep 10
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/mentorminds_test
          JWT_SECRET: test-secret-key
          PORT: 5000

      - name: Check security headers
        run: |
          echo "Checking security headers..."
          HEADERS=$(curl -i http://localhost:5000/health 2>/dev/null)
          
          echo "Response headers:"
          echo "$HEADERS"
          
          # Check for required headers
          if echo "$HEADERS" | grep -q "X-Content-Type-Options: nosniff"; then
            echo "✓ X-Content-Type-Options header present"
          else
            echo "✗ X-Content-Type-Options header missing"
            exit 1
          fi
          
          if echo "$HEADERS" | grep -q "X-Frame-Options"; then
            echo "✓ X-Frame-Options header present"
          else
            echo "✗ X-Frame-Options header missing"
            exit 1
          fi
          
          if echo "$HEADERS" | grep -q "Content-Security-Policy"; then
            echo "✓ Content-Security-Policy header present"
          else
            echo "✗ Content-Security-Policy header missing"
            exit 1
          fi

  helm-security:
    name: Helm Chart Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Lint Helm chart
        run: helm lint ./helm || true

      - name: Check for security issues in Helm values
        run: |
          echo "Checking Helm security configuration..."
          if grep -r "privileged: true" ./helm; then
            echo "⚠ Warning: Privileged containers found in Helm chart"
          fi
          if grep -r "runAsRoot: true" ./helm; then
            echo "⚠ Warning: Running as root found in Helm chart"
          fi

  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [npm-audit, security-tests, dependency-check, sast-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate security report
        run: |
          echo "# Security Scan Report" > SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Summary" >> SECURITY_REPORT.md
          echo "- npm audit: ${{ needs.npm-audit.result }}" >> SECURITY_REPORT.md
          echo "- Security tests: ${{ needs.security-tests.result }}" >> SECURITY_REPORT.md
          echo "- Dependency check: ${{ needs.dependency-check.result }}" >> SECURITY_REPORT.md
          echo "- SAST scan: ${{ needs.sast-scan.result }}" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Artifacts" >> SECURITY_REPORT.md
          echo "- [NPM Audit Report](npm-audit-report/audit-report.json)" >> SECURITY_REPORT.md
          echo "- [Security Test Coverage](security-test-coverage/)" >> SECURITY_REPORT.md
          cat SECURITY_REPORT.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: SECURITY_REPORT.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('SECURITY_REPORT.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Fail if security checks failed
        if: |
          needs.npm-audit.result == 'failure' ||
          needs.security-tests.result == 'failure' ||
          needs.dependency-check.result == 'failure'
        run: exit 1
