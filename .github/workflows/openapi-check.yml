name: OpenAPI Breaking Changes Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/routes/**'
      - 'src/controllers/**'
      - 'src/docs/schemas/**'
      - 'openapi.json'

jobs:
  check-breaking-changes:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate OpenAPI spec
        run: npm run generate:spec
      
      - name: Check for breaking changes
        run: npm run check:breaking
      
      - name: Upload OpenAPI spec as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 30
      
      - name: Comment PR with changes
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Breaking changes detected in API spec!**\n\nPlease review the changes and ensure backward compatibility or bump the API version.'
            })
